name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push streambed-controller
        uses: docker/build-push-action@v6
        with:
          context: .
          file: controller/ControllerNode/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ashishbasetty/streambed-controller:latest

      - name: Build and push streambed-daemon
        uses: docker/build-push-action@v6
        with:
          context: .
          file: controller/DeploymentDaemon/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ashishbasetty/streambed-daemon:latest

      - name: Build and push streambed-server
        uses: docker/build-push-action@v6
        with:
          context: server
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ashishbasetty/streambed-server:latest

      - name: Build and push streambed-edge
        uses: docker/build-push-action@v6
        with:
          context: edge
          file: edge/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ashishbasetty/streambed-edge:latest
