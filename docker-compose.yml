# StreamBed: controller + deployment daemons per device.
# Daemons register with the controller; a launch script deploys edge/server containers.
# Run from project root. Create daemon-data dirs first: mkdir -p daemon-data/{edge1,edge2,edge3,server1,server2}/{streambed}
#
# QUIC sidecar rollout: set STREAM_TRANSPORT=quic on all daemons to flip the
# inter-host transport. Each daemon will spawn its sidecar by name
# `streambed-default-<device-id>-sidecar` (resolvable via docker DNS).
# Default is udp until soak passes (see QuicSidecar.md).

version: "3.9"

services:
  controller:
    build:
      context: .
      dockerfile: controller/ControllerNode/Dockerfile
    image: ashishbasetty/streambed-controller:latest
    container_name: streambed-controller
    ports:
      - "8080:8080"
    volumes:
      - ./controller/data:/app/data
    environment:
      - HEARTBEAT_TIMEOUT_SECS=30
    networks:
      - streambed-net

  router:
    build:
      context: .
      dockerfile: controller/Router/Dockerfile
    image: ashishbasetty/streambed-router:latest
    container_name: streambed-router
    ports:
      - "8090:8090"
    volumes:
      - ./controller/router-data:/app/data
    environment:
      - ROUTER_ADMIN_TOKEN=${ROUTER_ADMIN_TOKEN:-dev-token}
    depends_on:
      - controller
    networks:
      - streambed-net

  # --- Edge daemons (each manages an edge container) ---
  daemon-edge1:
    build:
      context: .
      dockerfile: controller/DeploymentDaemon/Dockerfile
    container_name: streambed-daemon-edge1
    ports:
      - "9090:9090"
      - "9000:9000/tcp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./daemon-data/edge1:/app/data
    environment:
      - STREAMBED_CONFIG_HOST_PATH=${PWD}/daemon-data/edge1
      - STREAMBED_DATA_HOST_PATH=${PWD}/daemon-data/edge1/streambed
      - STREAMBED_HOST_PORT=8000
      - STREAMBED_CONTAINER_PORT=8000
      - STREAMBED_MEMORY_LIMIT=6g
      - CONTROLLER_URL=http://controller:8080
      - DEVICE_ID=edge-001
      - DEVICE_TYPE=edge
      - DEVICE_CLUSTER=default
      - DAEMON_ADDRESS=daemon-edge1
      - VIDEO_SOURCE=synthetic
      - STREAM_TRANSPORT=${STREAM_TRANSPORT:-udp}
      - SIDECAR_IMAGE=${SIDECAR_IMAGE:-ashishbasetty/streambed-quic-sidecar:latest}
      - SIDECAR_PEER_ADDRESS=streambed-default-server-001-sidecar:4433
    depends_on:
      - controller
    networks:
      - streambed-net

  daemon-edge2:
    build:
      context: .
      dockerfile: controller/DeploymentDaemon/Dockerfile
    container_name: streambed-daemon-edge2
    ports:
      - "9091:9090"
      - "9001:9000/tcp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./daemon-data/edge2:/app/data
    environment:
      - STREAMBED_CONFIG_HOST_PATH=${PWD}/daemon-data/edge2
      - STREAMBED_DATA_HOST_PATH=${PWD}/daemon-data/edge2/streambed
      - STREAMBED_HOST_PORT=8002
      - STREAMBED_CONTAINER_PORT=8000
      - STREAMBED_MEMORY_LIMIT=6g
      - CONTROLLER_URL=http://controller:8080
      - DEVICE_ID=edge-002
      - DEVICE_TYPE=edge
      - DEVICE_CLUSTER=default
      - DAEMON_ADDRESS=daemon-edge2
      - VIDEO_SOURCE=synthetic
      - STREAM_TRANSPORT=${STREAM_TRANSPORT:-udp}
      - SIDECAR_IMAGE=${SIDECAR_IMAGE:-ashishbasetty/streambed-quic-sidecar:latest}
      - SIDECAR_PEER_ADDRESS=streambed-default-server-001-sidecar:4433
    depends_on:
      - controller
    networks:
      - streambed-net

  daemon-edge3:
    build:
      context: .
      dockerfile: controller/DeploymentDaemon/Dockerfile
    container_name: streambed-daemon-edge3
    ports:
      - "9092:9090"
      - "9002:9000/tcp"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./daemon-data/edge3:/app/data
    environment:
      - STREAMBED_CONFIG_HOST_PATH=${PWD}/daemon-data/edge3
      - STREAMBED_DATA_HOST_PATH=${PWD}/daemon-data/edge3/streambed
      - STREAMBED_HOST_PORT=8003
      - STREAMBED_CONTAINER_PORT=8000
      - STREAMBED_MEMORY_LIMIT=6g
      - CONTROLLER_URL=http://controller:8080
      - DEVICE_ID=edge-003
      - DEVICE_TYPE=edge
      - DEVICE_CLUSTER=default
      - DAEMON_ADDRESS=daemon-edge3
      - VIDEO_SOURCE=synthetic
      - STREAM_TRANSPORT=${STREAM_TRANSPORT:-udp}
      - SIDECAR_IMAGE=${SIDECAR_IMAGE:-ashishbasetty/streambed-quic-sidecar:latest}
      - SIDECAR_PEER_ADDRESS=streambed-default-server-001-sidecar:4433
    depends_on:
      - controller
    networks:
      - streambed-net

  # --- Server daemons (each manages a server container) ---
  daemon-server1:
    build:
      context: .
      dockerfile: controller/DeploymentDaemon/Dockerfile
    container_name: streambed-daemon-server1
    ports:
      - "9093:9090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./daemon-data/server1:/app/data
    environment:
      - STREAMBED_CONFIG_HOST_PATH=${PWD}/daemon-data/server1
      - STREAMBED_DATA_HOST_PATH=${PWD}/daemon-data/server1/streambed
      - STREAMBED_HOST_PORT=8001
      - STREAMBED_CONTAINER_PORT=8001
      - STREAMBED_MEMORY_LIMIT=6g
      - CONTROLLER_URL=http://controller:8080
      - DEVICE_ID=server-001
      - DEVICE_TYPE=server
      - DEVICE_CLUSTER=default
      - DAEMON_ADDRESS=daemon-server1
      - STREAM_TRANSPORT=${STREAM_TRANSPORT:-udp}
      - SIDECAR_IMAGE=${SIDECAR_IMAGE:-ashishbasetty/streambed-quic-sidecar:latest}
    depends_on:
      - controller
    networks:
      - streambed-net

  daemon-server2:
    build:
      context: .
      dockerfile: controller/DeploymentDaemon/Dockerfile
    container_name: streambed-daemon-server2
    ports:
      - "9094:9090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./daemon-data/server2:/app/data
    environment:
      - STREAMBED_CONFIG_HOST_PATH=${PWD}/daemon-data/server2
      - STREAMBED_DATA_HOST_PATH=${PWD}/daemon-data/server2/streambed
      - STREAMBED_HOST_PORT=8004
      - STREAMBED_CONTAINER_PORT=8001
      - STREAMBED_MEMORY_LIMIT=6g
      - CONTROLLER_URL=http://controller:8080
      - DEVICE_ID=server-002
      - DEVICE_TYPE=server
      - DEVICE_CLUSTER=default
      - DAEMON_ADDRESS=daemon-server2
      - STREAM_TRANSPORT=${STREAM_TRANSPORT:-udp}
      - SIDECAR_IMAGE=${SIDECAR_IMAGE:-ashishbasetty/streambed-quic-sidecar:latest}
    depends_on:
      - controller
    networks:
      - streambed-net

networks:
  streambed-net:
    driver: bridge
