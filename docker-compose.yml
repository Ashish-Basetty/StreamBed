version: "3.9"

services:
  controller:
    build:
      context: .
      dockerfile: controller/ControllerNode/Dockerfile
    image: ashishbasetty/streambed-controller:latest
    container_name: streambed-controller
    ports:
      - "8080:8080"
    volumes:
      - ./controller/data:/app/data
    networks:
      - streambed-net

  edge:
    build:
      context: .
      dockerfile: edge/Dockerfile
    image: ashishbasetty/streambed-edge:latest
    container_name: streambed-edge
    ports:
      - "8000:8000"
    volumes:
      - edge-data:/data/streambed
    environment:
      - DEVICE_ID=edge-001
      - DEVICE_CLUSTER=default
      - CONTROLLER_URL=http://controller:8080
      - STORAGE_DIR=/data/streambed
      - VIDEO_SOURCE=0
      - SERVER_HOST=server
      - SERVER_PORT=9000
      - MODEL_DEVICE=cpu
    depends_on:
      - controller
      - server
    networks:
      - streambed-net

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: ashishbasetty/streambed-server:latest
    container_name: streambed-server
    ports:
      - "8001:8001"
      - "9000:9000"
    volumes:
      - server-data:/data/streambed
    environment:
      - DEVICE_ID=server-001
      - DEVICE_CLUSTER=default
      - CONTROLLER_URL=http://controller:8080
      - STORAGE_DIR=/data/streambed
      - MODEL_DEVICE=cpu
      - STREAM_LISTEN_PORT=9000
    networks:
      - streambed-net

volumes:
  edge-data:
  server-data:

networks:
  streambed-net:
    driver: bridge
