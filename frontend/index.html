<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamBed Controller</title>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; }

    nav { display: flex; gap: 4px; }
    nav button {
      background: transparent;
      border: none;
      color: #aaa;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    nav button.active { background: #fff2; color: #fff; }
    nav button:hover:not(.active) { color: #ddd; }

    .refresh-info { margin-left: auto; font-size: 0.8rem; color: #888; }

    main { padding: 24px; max-width: 1600px; margin: 0 auto; }

    .cluster-card {
      background: #fff;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .cluster-header {
      background: #eef;
      padding: 10px 16px;
      font-weight: 600;
      font-size: 0.95rem;
      border-bottom: 1px solid #e0e0f0;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 16px; text-align: left; font-size: 0.875rem; }
    td:first-child, th:first-child { min-width: 160px; }
    th { background: #fafafa; color: #555; font-weight: 600; border-bottom: 1px solid #eee; }
    tr:not(:last-child) td { border-bottom: 1px solid #f0f0f0; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-active       { background: #d4edda; color: #155724; }
    .badge-unresponsive { background: #f8d7da; color: #721c24; }
    .badge-failure      { background: #fff3cd; color: #856404; }
    .badge-unknown      { background: #e2e3e5; color: #383d41; }

.btn {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
    }
    .btn-primary { background: #4a6cf7; color: #fff; }
    .btn-primary:hover { background: #3a5ce4; }
    .btn-danger  { background: #dc3545; color: #fff; }
    .btn-danger:hover  { background: #c82333; }
    .btn-sm { padding: 4px 12px; font-size: 0.8rem; }
    .btn-row { display: flex; gap: 8px; margin-top: 6px; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 10px 18px;
      border-radius: 6px;
      font-size: 0.875rem;
      color: #fff;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 9999;
    }
    .toast.show { opacity: 1; }
    .toast.ok  { background: #28a745; }
    .toast.err { background: #dc3545; }

    .section-actions { margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
    .section-actions span { font-size: 0.82rem; color: #888; }
    .model-input { width: 220px; padding: 4px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.85rem; }
    .port-input  { width: 80px;  padding: 4px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.85rem; }
    .empty { color: #999; font-size: 0.875rem; padding: 16px; }

    .server-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
      padding: 16px;
    }
    .server-card {
      border: 1px solid #e0e0e8;
      border-radius: 8px;
      background: #fafbff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .server-card.unassigned { background: #fff8f0; border-color: #f0d9b8; }

    .server-head {
      padding: 12px 14px;
      background: #1a1a2e;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .server-head .server-id {
      font-weight: 600;
      font-size: 0.95rem;
      margin-right: 10px;
    }
    .server-head .meta { font-size: 0.78rem; color: #c8c8d8; display: flex; gap: 10px; flex-wrap: wrap; }
    .server-head .deploy-row {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px;
    }
    .server-head .deploy-row .model-input,
    .server-head .deploy-row .port-input {
      background: #fff;
    }

    .arrow {
      text-align: center;
      font-size: 1.4rem;
      color: #4a6cf7;
      padding: 4px 0;
    }

    .edges {
      padding: 8px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .edge-row {
      border: 1px solid #e8e8f0;
      border-radius: 6px;
      background: #fff;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .edge-head { display: flex; align-items: center; gap: 8px; }
    .edge-id { font-weight: 600; font-size: 0.88rem; }
    .edge-row .meta { font-size: 0.76rem; color: #777; display: flex; gap: 6px; flex-wrap: wrap; }
    .edge-row .deploy-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }
    .empty-edges { font-size: 0.82rem; color: #aaa; font-style: italic; padding: 6px 4px; }
  </style>
</head>
<body x-data="app()" x-init="init()">

<header>
  <h1>StreamBed Controller</h1>
  <span class="refresh-info" x-text="lastRefresh"></span>
</header>

<main>
  <div class="section-actions">
    <button class="btn btn-primary btn-sm" @click="refresh()">Refresh</button>
    <span>Auto-refresh: 10s</span>
  </div>

  <template x-if="error">
    <p class="empty" x-text="'Error: ' + error"></p>
  </template>

  <template x-if="!error && clusters.length === 0">
    <p class="empty">No devices found. Are any devices registered?</p>
  </template>

  <template x-for="cluster in clusters" :key="cluster.name">
    <div class="cluster-card">
      <div class="cluster-header">
        Cluster: <span x-text="cluster.name"></span>
        &nbsp;<small style="color:#888;font-weight:400">
          (<span x-text="cluster.servers.length"></span> server<span x-text="cluster.servers.length === 1 ? '' : 's'"></span>,
          <span x-text="cluster.totalEdges"></span> edge<span x-text="cluster.totalEdges === 1 ? '' : 's'"></span>)
        </small>
      </div>

      <div class="server-grid">
        <!-- One card per server -->
        <template x-for="srv in cluster.servers" :key="srv.device.device_id">
          <div class="server-card">
            <div class="server-head">
              <div>
                <span class="server-id" x-text="srv.device.device_id"></span>
                <span class="badge" :class="badgeClass(srv.device.status)" x-text="srv.device.status || 'Unknown'"></span>
              </div>
              <div class="meta">
                <div>Model: <span x-text="srv.device.current_model || '—'"></span></div>
                <div>Heartbeat: <span x-text="fmtTime(srv.device.last_heartbeat)"></span></div>
              </div>
              <div class="deploy-row">
                <input class="model-input" x-model="srv.device._newImage" placeholder="user/repo:tag" />
                <input class="port-input" x-model="srv.device._hostPort" placeholder="port" type="number" />
                <button class="btn btn-primary btn-sm" @click="deployFromRow(srv.device)">Deploy</button>
                <button class="btn btn-danger btn-sm" @click="removeFromRow(srv.device)">Remove</button>
              </div>
            </div>

            <div class="arrow">&#8593;</div>

            <div class="edges">
              <template x-if="srv.edges.length === 0">
                <div class="empty-edges">No edges routed here</div>
              </template>
              <template x-for="e in srv.edges" :key="e.device_id">
                <div class="edge-row">
                  <div class="edge-head">
                    <span x-text="e.device_id" class="edge-id"></span>
                    <span class="badge" :class="badgeClass(e.status)" x-text="e.status || 'Unknown'"></span>
                  </div>
                  <div class="meta">
                    <span>Model: <span x-text="e.current_model || '—'"></span></span>
                    <span>· HB: <span x-text="fmtTime(e.last_heartbeat)"></span></span>
                    <span x-show="e._routeUpdated">· routed: <span x-text="fmtTime(e._routeUpdated)"></span></span>
                  </div>
                  <div class="deploy-row">
                    <input class="model-input" x-model="e._newImage" placeholder="user/repo:tag" />
                    <input class="port-input" x-model="e._hostPort" placeholder="port" type="number" />
                    <button class="btn btn-primary btn-sm" @click="deployFromRow(e)">Deploy</button>
                    <button class="btn btn-danger btn-sm" @click="removeFromRow(e)">Remove</button>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Unassigned edges (no routing entry pointing at any server) -->
        <template x-if="cluster.unassignedEdges.length > 0">
          <div class="server-card unassigned">
            <div class="server-head">
              <div><span class="server-id">Unassigned edges</span></div>
              <div class="meta">No routing target for these edges</div>
            </div>
            <div class="edges">
              <template x-for="e in cluster.unassignedEdges" :key="e.device_id">
                <div class="edge-row">
                  <div class="edge-head">
                    <span x-text="e.device_id" class="edge-id"></span>
                    <span class="badge" :class="badgeClass(e.status)" x-text="e.status || 'Unknown'"></span>
                  </div>
                  <div class="meta">
                    <span>Model: <span x-text="e.current_model || '—'"></span></span>
                    <span>· HB: <span x-text="fmtTime(e.last_heartbeat)"></span></span>
                  </div>
                  <div class="deploy-row">
                    <input class="model-input" x-model="e._newImage" placeholder="user/repo:tag" />
                    <input class="port-input" x-model="e._hostPort" placeholder="port" type="number" />
                    <button class="btn btn-primary btn-sm" @click="deployFromRow(e)">Deploy</button>
                    <button class="btn btn-danger btn-sm" @click="removeFromRow(e)">Remove</button>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>
  </template>
</main>

<!-- Toast -->
<div class="toast" :class="{ show: toast.visible, ok: toast.ok, err: !toast.ok }" x-text="toast.msg"></div>

<script src="app.js"></script>
</body>
</html>
