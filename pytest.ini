[pytest]
markers =
    unit: Unit tests (no external services, fast)
    integration: Integration tests (require external services or subprocesses)
    integration_controller: Integration tests that spawn/use the controller
    integration_docker: Integration tests that require Docker and docker-compose
    integration_stream: Integration tests for stream/network behavior
    integration_quic: Integration tests for the QUIC sidecar (requires Go binary or Python-only codec)
    soak: Long-running soak tests (set STREAMBED_RUN_SOAK=1 to enable)
asyncio_mode = auto
testpaths = tests
