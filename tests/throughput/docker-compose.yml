services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - FORWARD_HOST=server
      - FORWARD_PORT=9000
      - DELAY_MS=${DELAY_MS:-0}
      - LOSS_PCT=${LOSS_PCT:-0}
    ports:
      - "9001:9001/udp"
    networks:
      - streambed-throughput

  server:
    build:
      context: ../..
      dockerfile: server/Dockerfile
    environment:
      - DEVICE_ID=server-001
      - DEVICE_CLUSTER=default
      - CONTROLLER_URL=
      - STORAGE_DIR=/data/streambed
      - MODEL_DEVICE=cpu
      - STREAM_LISTEN_PORT=9000
    ports:
      - "8001:8001"
    volumes:
      - server-model-cache:/root/.cache/torch
    networks:
      - streambed-throughput

networks:
  streambed-throughput:
    driver: bridge

volumes:
  server-model-cache:
